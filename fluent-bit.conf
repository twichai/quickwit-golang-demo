[SERVICE]
    Flush        5
    Daemon       off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name              tail
    Tag               my_app.log
    Path              /var/log/myapp.log
    Parser            json
    DB                /var/log/myapp.db
    Mem_Buf_Limit     8MB
    Skip_Long_Lines   On

[FILTER]
    Name  modify
    Match *
    Add   creationDate ${time}

[OUTPUT]
    Name          http
    Match         *
    Host          quickwit
    Port          7280
    URI           /api/v1/stackoverflow/ingest
    Format        json_lines
    Header        Content-Type application/json
    json_date_key creationDate
    json_date_format iso8601